<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TechWorld Referral</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">🚀 TechWorld Referral</a>
    </div>
  </nav>

  <!-- Registration Form -->
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-card-title">Create Account</h1>
      <p class="auth-card-subtitle">Join our referral community today</p>

      <!-- Alert Messages -->
      <div id="successAlert" class="alert alert-success"></div>
      <div id="errorAlert" class="alert alert-error"></div>

      <!-- Registration Form -->
      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            placeholder="John Doe" 
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="your@email.com" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="At least 6 characters" 
            required
          >
          <small style="color: #b0b0b0; display: block; margin-top: 0.5rem;">
            Password must be at least 6 characters long
          </small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirm your password" 
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem;">
          Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-text">Or</span>
      </div>

      <!-- Google Login -->
      <button id="googleRegisterBtn" class="btn btn-secondary" style="width: 100%; padding: 0.85rem; font-size: 1rem;">
        📧 Sign Up with Google
      </button>

      <!-- Login Link -->
      <div class="auth-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { registerUser, loginWithGoogle, getCurrentUser } from "./auth.js";

    // Check if already logged in
    window.addEventListener("load", async () => {
      const user = await getCurrentUser();
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    // Show alert message
    function showAlert(message, type) {
      const alertDiv = type === "success" ? 
        document.getElementById("successAlert") : 
        document.getElementById("errorAlert");
      
      alertDiv.textContent = message;
      alertDiv.classList.add("show");

      setTimeout(() => {
        alertDiv.classList.remove("show");
      }, 5000);
    }

    // Handle Email Registration
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      // Validation
      if (!fullName) {
        showAlert("Please enter your full name", "error");
        return;
      }

      if (!email) {
        showAlert("Please enter your email", "error");
        return;
        }

      if (password.length < 6) {
        showAlert("Password must be at least 6 characters", "error");
        return;
      }

      if (password !== confirmPassword) {
        showAlert("Passwords don't match", "error");
        return;
      }

      // Disable button during registration
      const submitBtn = document.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating Account...";

      try {
        const result = await registerUser(email, password, fullName);
        
        if (result.success) {
          showAlert("Account created! Redirecting to dashboard...", "success");
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2000);
        } else {
          showAlert(result.error || "Registration failed. Please try again.", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Account";
        }
      } catch (error) {
        showAlert(error.message || "An error occurred during registration", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    });

    // Handle Google Registration
    document.getElementById("googleRegisterBtn").addEventListener("click", async () => {
      const googleBtn = document.getElementById("googleRegisterBtn");
      googleBtn.disabled = true;
      googleBtn.textContent = "Signing up...";

      try {
        const result = await loginWithGoogle();
        
        if (result.success) {
          showAlert("Account created! Redirecting to dashboard...", "success");
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2000);
        } else {
          showAlert(result.error || "Google sign-up failed", "error");
          googleBtn.disabled = false;
          googleBtn.textContent = "📧 Sign Up with Google";
        }
      } catch (error) {
        showAlert(error.message || "An error occurred", "error");
        googleBtn.disabled = false;
        googleBtn.textContent = "📧 Sign Up with Google";
      }
    });
  </script>
</body>
</html>
