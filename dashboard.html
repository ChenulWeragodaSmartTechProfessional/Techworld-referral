<!DOCTYPE html>
<html>

<head>

<title>Dashboard - TechWorld Referral</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="content">


<div class="container">


<div class="card">


<h1 class="card-title">
My Dashboard 🚀
</h1>



<h2 id="name">
Loading...
</h2>



<h2 id="points">
Points: 0
</h2>



<h3>
My Referral Link
</h3>



<div class="referral-link-input">


<input 
id="link"
readonly
>


<button 
class="btn btn-primary"
onclick="copyLink()"
>

Copy

</button>


</div>



<button 
class="btn btn-danger"
onclick="logout()"
>

Logout

</button>
</div>
</div>
</div>
<script type="module" src="dashboard.js"></script>


</body>
</html>
